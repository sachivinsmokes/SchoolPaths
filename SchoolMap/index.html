<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Campus Pathfinder</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h2>Campus Map Pathfinder</h2>
  
  <div id="map-container">
    <img id="map-image" src="images/UsantLiveMap.jpg" alt="School Map">
    <canvas id="map-canvas" width="600" height="400"></canvas>
  </div>

  <div class="controls">
    <div class="search-row">
      <label for="from-input">From</label>
      <input id="from-input" list="location-list" placeholder="Start location" />
      <label for="to-input">To</label>
      <input id="to-input" list="location-list" placeholder="End location" />
      <button id="find-route-btn">Find Route</button>
    </div>

    <datalist id="location-list"></datalist>

    <p id="output"></p>
  </div>

  <div id="hover-tooltip" style="position:absolute; display:none; background: rgba(0,0,0,.8); color:#fff; padding:5px 8px; border-radius:4px; font-size:12px; pointer-events:none; z-index:10;">Node</div>

  <script src="script.js"></script>
</body>
</html>
